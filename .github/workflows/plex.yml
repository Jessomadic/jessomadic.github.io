name: PickFlick — Validate & Inject Config

on:
  push:
    branches: [main]
  workflow_dispatch:

# One run at a time per branch; newer runs cancel older queued ones
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: Validate ────────────────────────────────────────────────────────
  validate:
    name: Validate PickFlick app
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check required files exist
        run: |
          echo "=== Checking PickFlick app files ==="
          MISSING=0
          for f in plex/index.html plex/app.js; do
            [ -f "$f" ] && echo "  ✅  $f" || { echo "  ❌  $f — MISSING"; MISSING=1; }
          done
          echo "  ✅  plex/firebase-config.js  (generated by inject-config job)"
          [ $MISSING -eq 0 ] || exit 1

      - name: Validate JavaScript syntax
        run: |
          echo "=== Checking app.js syntax ==="
          node -e "
            const fs = require('fs');
            let code = fs.readFileSync('plex/app.js', 'utf8');
            code = code.replace(/^import .+\$/gm, '');
            try { new Function(code); console.log('  ✅  app.js syntax valid'); }
            catch(e) { console.error('  ❌  Syntax error:', e.message); process.exit(1); }
          "

      - name: Security scan
        run: |
          echo "=== Security scan ==="
          if grep -n "localStorage" plex/app.js; then
            echo "  ❌  localStorage found — Plex tokens must not persist beyond the session"
            exit 1
          else
            echo "  ✅  No localStorage usage"
          fi

      - name: Validate HTML structure
        run: |
          echo "=== Checking index.html screens ==="
          MISSING=0
          for id in screen-landing screen-join-name screen-auth screen-library \
                    screen-lobby screen-swipe screen-waiting screen-results \
                    screen-setup-needed; do
            grep -q "$id" plex/index.html \
              && echo "  ✅  $id" \
              || { echo "  ❌  $id — not found"; MISSING=1; }
          done
          [ $MISSING -eq 0 ] || exit 1

  # ── Job 2: Inject Firebase config and commit to branch ─────────────────────
  # GitHub Pages serves directly from main, so committing the generated file
  # is all that's needed — no artifact upload or Pages API required.
  inject-config:
    name: Inject Firebase config
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: write   # needed to push the generated file back to main

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Use a token with write access so the push in the next step works
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate plex/firebase-config.js from secret
        run: |
          if [ -z "$FIREBASE_CONFIG" ]; then
            echo "::error::FIREBASE_CONFIG_JSON secret is not set."
            echo "Go to: Repo → Settings → Secrets and variables → Actions → New secret"
            echo "  Name : FIREBASE_CONFIG_JSON"
            echo '  Value: {"apiKey":"AIza...","authDomain":"...","databaseURL":"...","projectId":"...","storageBucket":"...","messagingSenderId":"...","appId":"..."}'
            exit 1
          fi
          node -e "
            const raw = process.env.FIREBASE_CONFIG;
            let parsed;
            try { parsed = JSON.parse(raw); }
            catch(e) { console.error('FIREBASE_CONFIG_JSON is not valid JSON:', e.message); process.exit(1); }
            const required = ['apiKey','authDomain','databaseURL','projectId'];
            const missing  = required.filter(k => !parsed[k]);
            if (missing.length) {
              console.error('Missing required keys:', missing.join(', '));
              process.exit(1);
            }
            const js = '// Auto-generated by GitHub Actions — do not edit manually\n'
                     + 'export const firebaseConfig = '
                     + JSON.stringify(parsed, null, 2)
                     + ';\n';
            require('fs').writeFileSync('plex/firebase-config.js', js);
            console.log('  ✅  plex/firebase-config.js written (projectId:', parsed.projectId + ')');
          "
        env:
          FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG_JSON }}

      - name: Commit and push generated config
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Force-add because the file is in .gitignore
          git add -f plex/firebase-config.js

          # Only commit if something actually changed
          if git diff --staged --quiet; then
            echo "  ✅  Config unchanged — no commit needed"
          else
            git commit -m "chore: inject Firebase config [skip ci]"
            git push origin main
            echo "  ✅  Config committed and pushed"
          fi

      - name: Summary
        run: |
          echo ""
          echo "=== PickFlick deploy summary ==="
          echo "  Repo  : jessomadic/jessomadic.github.io"
          echo "  Branch: main  (GitHub Pages serves directly from here)"
          echo "  App   : https://jessomadic.github.io/plex/"
          CNAME=$(cat CNAME 2>/dev/null || true)
          [ -n "$CNAME" ] && echo "  Also  : https://${CNAME}/plex/"
