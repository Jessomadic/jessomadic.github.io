name: PickFlick — Validate & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual re-runs from the Actions tab

# Only one deployment at a time; never cancel an in-flight deploy
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ── Job 1: Validate ────────────────────────────────────────────────────────
  validate:
    name: Validate PickFlick app
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check required files exist
        run: |
          echo "=== Checking PickFlick app files ==="
          MISSING=0
          for f in plex/index.html plex/app.js; do
            if [ -f "$f" ]; then
              echo "  ✅  $f"
            else
              echo "  ❌  $f — MISSING"
              MISSING=1
            fi
          done
          # firebase-config.js is intentionally NOT committed — injected at deploy time
          echo "  ✅  plex/firebase-config.js  (injected from secret at deploy time)"
          [ $MISSING -eq 0 ] || exit 1

      - name: Validate JavaScript syntax
        run: |
          echo "=== Checking app.js syntax ==="
          node -e "
            const fs = require('fs');
            let code = fs.readFileSync('plex/app.js', 'utf8');
            code = code.replace(/^import .+\$/gm, '');
            try { new Function(code); console.log('  ✅  app.js syntax valid'); }
            catch(e) { console.error('  ❌  Syntax error:', e.message); process.exit(1); }
          "

      - name: Scan for credential anti-patterns
        run: |
          echo "=== Security scan ==="
          ISSUES=0
          if grep -n "localStorage" plex/app.js; then
            echo "  ❌  localStorage found — Plex tokens must NOT persist beyond the session"
            ISSUES=1
          else
            echo "  ✅  No localStorage usage (Plex token stays in sessionStorage only)"
          fi
          if grep -qE "YOUR_API_KEY|placeholder" plex/app.js 2>/dev/null; then
            echo "  ⚠️  Placeholder values found in app.js"
          fi
          [ $ISSUES -eq 0 ] || exit 1

      - name: Validate HTML structure
        run: |
          echo "=== Checking index.html structure ==="
          MISSING=0
          for id in screen-landing screen-join-name screen-auth screen-library \
                    screen-lobby screen-swipe screen-waiting screen-results \
                    screen-setup-needed; do
            grep -q "$id" plex/index.html \
              && echo "  ✅  $id" \
              || { echo "  ❌  $id — not found"; MISSING=1; }
          done
          [ $MISSING -eq 0 ] || exit 1

  # ── Job 2: Deploy to GitHub Pages ─────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      pages: write        # required to deploy to Pages
      id-token: write     # required for OIDC token used by deploy-pages

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Firebase config from secret
        # The FIREBASE_CONFIG_JSON secret holds the full firebaseConfig object as JSON.
        # It is written into the file at deploy time and NEVER committed to git.
        run: |
          if [ -z "$FIREBASE_CONFIG" ]; then
            echo "::error::FIREBASE_CONFIG_JSON secret is not set."
            echo ""
            echo "Add it in: GitHub repo → Settings → Secrets and variables → Actions → New secret"
            echo "  Name : FIREBASE_CONFIG_JSON"
            echo "  Value: paste your Firebase config JSON object, e.g."
            echo '  {"apiKey":"AIza...","authDomain":"...","databaseURL":"...","projectId":"...","storageBucket":"...","messagingSenderId":"...","appId":"..."}'
            exit 1
          fi
          node -e "
            const raw = process.env.FIREBASE_CONFIG;
            // Validate it's real JSON before writing
            let parsed;
            try { parsed = JSON.parse(raw); }
            catch(e) { console.error('FIREBASE_CONFIG_JSON is not valid JSON:', e.message); process.exit(1); }
            const required = ['apiKey','authDomain','databaseURL','projectId'];
            const missing  = required.filter(k => !parsed[k]);
            if (missing.length) {
              console.error('Missing keys in FIREBASE_CONFIG_JSON:', missing.join(', '));
              process.exit(1);
            }
            const js = 'export const firebaseConfig = ' + JSON.stringify(parsed, null, 2) + ';\n';
            require('fs').writeFileSync('plex/firebase-config.js', js);
            console.log('  ✅  plex/firebase-config.js generated (projectId:', parsed.projectId + ')');
          "
        env:
          FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG_JSON }}

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload site as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Deploy the entire repo (Hugo output + plex/ with injected config)
          path: "."

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

      - name: Print deployment summary
        run: |
          echo ""
          echo "=== Deployment complete ==="
          echo "  URL  : ${{ steps.deploy.outputs.page_url }}"
          echo "  App  : ${{ steps.deploy.outputs.page_url }}plex/"
          echo "  SHA  : ${{ github.sha }}"
