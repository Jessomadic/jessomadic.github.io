name: PickFlick — Validate & Deploy

on:
  push:
    branches: ["**"]
    paths:
      - "plex/**"
      - ".github/workflows/plex.yml"
  pull_request:
    branches: [main]
    paths:
      - "plex/**"
      - ".github/workflows/plex.yml"

# Prevent concurrent runs on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: Validate app files ──────────────────────────────────────────────
  validate:
    name: Validate PickFlick app
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js (for syntax checks)
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check required files exist
        run: |
          echo "=== Checking PickFlick app files ==="
          MISSING=0
          for f in plex/index.html plex/app.js plex/firebase-config.js; do
            if [ -f "$f" ]; then
              echo "  ✅  $f"
            else
              echo "  ❌  $f — MISSING"
              MISSING=1
            fi
          done
          [ $MISSING -eq 0 ] || (echo "" && echo "One or more required files are missing." && exit 1)

      - name: Validate JavaScript syntax
        run: |
          echo "=== Checking app.js syntax ==="
          # Strip ES module import lines (browser CDN URLs) before Node parses
          node -e "
            const fs = require('fs');
            let code = fs.readFileSync('plex/app.js', 'utf8');
            code = code.replace(/^import .+\$/gm, '');
            try { new Function(code); console.log('  ✅  app.js syntax valid'); }
            catch(e) { console.error('  ❌  Syntax error:', e.message); process.exit(1); }
          "

      - name: Check for placeholder Firebase config
        run: |
          echo "=== Checking Firebase config ==="
          if grep -q "YOUR_API_KEY" plex/firebase-config.js; then
            echo "  ⚠️  Firebase config still has placeholder values."
            echo "     Fill in plex/firebase-config.js with your project's real values."
            echo "     The app will show a setup screen until this is done."
          else
            echo "  ✅  Firebase config appears to be filled in."
          fi

      - name: Check for known anti-patterns
        run: |
          echo "=== Scanning for known issues ==="
          ISSUES=0

          # localStorage usage (credentials must not be persisted)
          if grep -n "localStorage" plex/app.js; then
            echo "  ❌  Found localStorage usage — Plex tokens must NOT be stored in localStorage."
            ISSUES=1
          else
            echo "  ✅  No localStorage usage (good — Plex tokens stay in sessionStorage only)"
          fi

          # Verify root-level Firebase multi-path update pattern
          if grep -q "update(ref(db), updates)" plex/app.js; then
            echo "  ✅  Multi-path Firebase update uses root ref correctly"
          fi

          [ $ISSUES -eq 0 ] || exit 1

      - name: Validate HTML structure
        run: |
          echo "=== Checking index.html structure ==="
          MISSING=0
          for selector in \
            "screen-landing" "screen-join-name" "screen-auth" "screen-library" \
            "screen-lobby"   "screen-swipe"     "screen-waiting" "screen-results" \
            "screen-setup-needed" "app.js" "firebase-config.js"; do
            if grep -q "$selector" plex/index.html; then
              echo "  ✅  $selector"
            else
              echo "  ❌  $selector — not found in index.html"
              MISSING=1
            fi
          done
          [ $MISSING -eq 0 ] || exit 1

  # ── Job 2: Deployment confirmation (main branch only) ─────────────────────
  confirm-deploy:
    name: Confirm GitHub Pages deployment
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Confirm deployment target
        run: |
          echo "=== Deployment summary ==="
          echo ""
          echo "  Branch : main"
          echo "  Commit : ${{ github.sha }}"
          echo "  Author : ${{ github.actor }}"
          echo ""
          echo "  GitHub Pages will auto-deploy this repository."
          echo "  PickFlick will be live at:"
          echo ""
          echo "    https://jessomadic.github.io/plex/"
          echo ""
          CNAME=$(cat CNAME 2>/dev/null || echo "")
          if [ -n "$CNAME" ]; then
            echo "  Custom domain also available at:"
            echo "    https://${CNAME}/plex/"
          fi

      - name: Check CNAME and .nojekyll are present
        run: |
          echo "=== Checking GitHub Pages config files ==="
          [ -f CNAME ]      && echo "  ✅  CNAME present     ($(cat CNAME))" || echo "  ⚠️  No CNAME file"
          [ -f .nojekyll ]  && echo "  ✅  .nojekyll present  (Jekyll disabled)" || echo "  ⚠️  Missing .nojekyll — Jekyll may process files unexpectedly"
