<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Internal ticketing and POS operations system graphic</title>
  <desc id="desc">Dashboard-style graphic showing tickets, parts, pricing, computer builds, and MSSQL data integration.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="0.55" stop-color="#111827"/>
      <stop offset="1" stop-color="#075985"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1">
      <stop offset="0" stop-color="#1f2937"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <path d="M0 540 C220 455 354 610 580 520 C784 438 920 455 1200 350 L1200 675 L0 675 Z" fill="#0369a1" opacity="0.2"/>
  <path d="M0 130 C180 70 330 145 500 96 C720 34 900 68 1200 34" fill="none" stroke="#38bdf8" stroke-width="3" opacity="0.22"/>

  <g filter="url(#shadow)">
    <rect x="92" y="82" width="1016" height="510" rx="26" fill="#f8fafc"/>
    <rect x="92" y="82" width="1016" height="72" rx="26" fill="#111827"/>
    <path d="M92 128 L92 154 L1108 154 L1108 128 Z" fill="#111827"/>
    <circle cx="132" cy="118" r="10" fill="#ef4444"/>
    <circle cx="166" cy="118" r="10" fill="#f59e0b"/>
    <circle cx="200" cy="118" r="10" fill="#22c55e"/>
    <text x="246" y="126" fill="#e5e7eb" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Internal Operations Console</text>
  </g>

  <g font-family="Segoe UI, Arial, sans-serif">
    <rect x="132" y="194" width="292" height="146" rx="18" fill="url(#panel)"/>
    <text x="162" y="238" fill="#f8fafc" font-size="28" font-weight="700">Tickets</text>
    <text x="162" y="280" fill="#38bdf8" font-size="44" font-weight="800">128</text>
    <text x="252" y="280" fill="#cbd5e1" font-size="20">active jobs</text>
    <rect x="162" y="304" width="214" height="12" rx="6" fill="#334155"/>
    <rect x="162" y="304" width="154" height="12" rx="6" fill="#38bdf8"/>

    <rect x="454" y="194" width="292" height="146" rx="18" fill="url(#panel)"/>
    <text x="484" y="238" fill="#f8fafc" font-size="28" font-weight="700">Builds</text>
    <text x="484" y="280" fill="#22c55e" font-size="44" font-weight="800">42</text>
    <text x="560" y="280" fill="#cbd5e1" font-size="20">in progress</text>
    <g fill="none" stroke="#22c55e" stroke-width="8" stroke-linecap="round">
      <path d="M662 298 L686 322 L722 270"/>
    </g>

    <rect x="776" y="194" width="292" height="146" rx="18" fill="url(#panel)"/>
    <text x="806" y="238" fill="#f8fafc" font-size="28" font-weight="700">Parts &amp; Pricing</text>
    <text x="806" y="280" fill="#f59e0b" font-size="44" font-weight="800">$</text>
    <text x="842" y="280" fill="#cbd5e1" font-size="20">live POS sync</text>
    <rect x="806" y="304" width="214" height="12" rx="6" fill="#334155"/>
    <rect x="806" y="304" width="188" height="12" rx="6" fill="#f59e0b"/>

    <rect x="132" y="378" width="440" height="142" rx="18" fill="#e2e8f0"/>
    <text x="162" y="420" fill="#0f172a" font-size="24" font-weight="800">Python + JavaScript Workflow</text>
    <rect x="162" y="446" width="350" height="12" rx="6" fill="#94a3b8"/>
    <rect x="162" y="474" width="284" height="12" rx="6" fill="#94a3b8"/>
    <rect x="162" y="502" width="318" height="12" rx="6" fill="#94a3b8"/>

    <rect x="628" y="378" width="440" height="142" rx="18" fill="#0f172a"/>
    <text x="660" y="420" fill="#f8fafc" font-size="24" font-weight="800">MSSQL Integration</text>
    <g fill="none" stroke="#38bdf8" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M680 472 C680 444 742 444 742 472 C742 500 680 500 680 472 Z"/>
      <path d="M742 472 H850"/>
      <path d="M850 444 H996 V500 H850 Z"/>
      <path d="M910 444 V500"/>
    </g>
    <text x="878" y="481" fill="#cbd5e1" font-size="18" font-weight="700">POS</text>
  </g>
</svg>
